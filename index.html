function fallbackExamples(item) {
  const p = item.pattern;
  const m = item.meaning;
  return [
    {jp:`この文法「${p}」を自然に使えるように、私は短い例文だけでなく、会話や読解に出てくる長い文の中でも意味を確認しています。`, pt:`Para conseguir usar naturalmente “${p}”, eu confirmo o significado não só em frases curtas, mas também em frases longas que aparecem em conversa e leitura.`},
    {jp:`先生は「${p}」の接続を説明したあとで、似ている表現との違いが分かるように、長い例文を三つ黒板に書いてくれました。`, pt:`Depois de explicar a conexão de “${p}”, o professor escreveu três frases longas no quadro para que entendêssemos a diferença em relação a expressões parecidas.`},
    {jp:`試験で「${p}」が出ても慌てないように、意味は「${m}」だと覚えるだけでなく、前後の文脈から筆者の意図を読む練習をしましょう。`, pt:`Para não se assustar se “${p}” aparecer na prova, não apenas memorize que significa “${m}”; pratique ler a intenção do autor pelo contexto anterior e posterior.`}
  ];
}
function escapeHTML(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function highlight(s, q) {
  const safe = escapeHTML(s);
  if(!q) return safe;
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'ig');
  return safe.replace(re, m => `<mark>${m}</mark>`);
}
let currentLevel = 'all';
const levels = ['all','N5','N4','N3','N2'];
const levelButtons = document.getElementById('levelButtons');
levels.forEach(l => {
  const b = document.createElement('button');
  b.className = 'btn' + (l==='all' ? ' active' : '');
  b.textContent = l==='all' ? 'Todos os níveis' : l;
  b.onclick = () => { currentLevel = l; document.querySelectorAll('#levelButtons .btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
  levelButtons.appendChild(b);
});
const tags = [...new Set(GRAMMAR.map(x=>x.tag))].sort((a,b)=>a.localeCompare(b));
const tagFilter = document.getElementById('tagFilter');
tags.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; tagFilter.appendChild(o); });
document.getElementById('q').addEventListener('input', render);
tagFilter.addEventListener('change', render);
document.getElementById('printBtn').addEventListener('click', () => window.print());

function render() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const tag = tagFilter.value;
  const filtered = GRAMMAR.filter(item => {
    const blob = `${item.level} ${item.pattern} ${item.meaning} ${item.formation} ${item.note} ${item.tag}`.toLowerCase();
    return (currentLevel==='all' || item.level===currentLevel) && (tag==='all' || item.tag===tag) && (!q || blob.includes(q));
  });
  document.getElementById('resultInfo').textContent = `${filtered.length} estrutura(s) encontradas.`;
  const cards = document.getElementById('cards');
  cards.innerHTML = filtered.map(item => {
    const exs = (item.examples && item.examples.length ? item.examples.map(e=>Array.isArray(e)?{jp:e[0],pt:e[1]}:e) : fallbackExamples(item));
    return `<article class="card">
      <div class="card-head">
        <div>
          <span class="level">${item.level}</span>
          <div class="pattern">${highlight(item.pattern, q)}</div>
          <div class="meaning">${highlight(item.meaning, q)}</div>
          <div class="tag">Tema: ${escapeHTML(item.tag)}</div>
        </div>
      </div>
      <div class="section-title">Formação</div>
      <div class="box">${highlight(item.formation, q)}</div>
      <div class="section-title">Explicação detalhada</div>
      <div class="box">${highlight(item.note, q)} Em português, pense primeiro na função comunicativa: tempo, causa, contraste, obrigação, hipótese, avaliação ou formalidade. Depois verifique se a palavra anterior precisa estar na forma de dicionário, ない, た, て, substantivo + の, ou adjetivo-na + な.</div>
      <div class="section-title">Frases longas</div>
      <div class="examples">${exs.map((e,i)=>`<div class="ex"><div class="jp">${i+1}. ${highlight(e.jp, q)}</div><div class="pt">${highlight(e.pt, q)}</div></div>`).join('')}</div>
      <div class="section-title">Mini revisão</div>
      <div class="box">Crie uma frase própria usando <strong>${escapeHTML(item.pattern)}</strong>, depois troque o tempo verbal ou o sujeito para testar se você realmente domina a conexão.</div>
    </article>`;
  }).join('');
}
render();
