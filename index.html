<!doctype html>
<html lang="pt-BR">
<head>

  <title>出来る｜JLPT 文法 N5-N2</title>
  <style>
    :root{
      --ink:#241411;--muted:#62443b;--paper:#fff8ed;--paper2:#fffdf7;--red:#aa1f19;--red2:#d43b2d;--gold:#d9a441;--bamboo:#5d7c43;--matcha:#3e6b41;--line:rgba(104,58,35,.18);--shadow:0 22px 54px rgba(61,27,19,.18)

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;color:var(--ink);font-family:"Noto Sans JP","Noto Sans",system-ui,-apple-system,Segoe UI,sans-serif;background:

      radial-gradient(circle at 50% 90%, rgba(172,209,156,.23), transparent 30rem),
      linear-gradient(135deg,#fff7ea 0%,#f8ead7 43%,#fffaf1 100%);min-height:100vh}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.24;background-image:linear-gradient(rgba(130,72,44,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(130,72,44,.16) 1px,transparent 1px);background-size:52px 52px;mask-image:linear-gradient(#000 0%,transparent 90%)}
    .petal{position:fixed;top:-40px;width:15px;height:10px;background:#f6aabd;border-radius:90% 0 90% 0;opacity:.75;animation:fall linear infinite;z-index:0}
    .petal:nth-child(1){left:5%;animation-duration:15s;animation-delay:-2s}.petal:nth-child(2){left:17%;animation-duration:20s;animation-delay:-8s}.petal:nth-child(3){left:31%;animation-duration:16s;animation-delay:-4s}.petal:nth-child(4){left:47%;animation-duration:23s;animation-delay:-12s}.petal:nth-child(5){left:63%;animation-duration:17s;animation-delay:-6s}.petal:nth-child(6){left:78%;animation-duration:21s;animation-delay:-10s}.petal:nth-child(7){left:92%;animation-duration:18s;animation-delay:-3s}
    @keyframes fall{0%{transform:translate3d(0,-40px,0) rotate(0deg)}100%{transform:translate3d(-90px,112vh,0) rotate(560deg)}}
    .kana{position:fixed;right:14px;bottom:12px;writing-mode:vertical-rl;font-size:29px;font-weight:950;color:rgba(139,45,32,.16);letter-spacing:.24em;z-index:0;user-select:none}
    header{position:relative;z-index:1;text-align:center;padding:38px 18px 22px}

    h1{margin:30px 0 0;font-size:clamp(92px,18vw,210px);line-height:.78;letter-spacing:.035em;font-weight:1000;color:#8f1512;text-shadow:0 9px 0 rgba(217,164,65,.34),0 22px 40px rgba(80,25,20,.20)}
    .subtitle{font-size:clamp(18px,2.4vw,34px);letter-spacing:.22em;margin:20px 0 0;font-weight:950;color:#37201a}
    .wrap{position:relative;z-index:1;width:min(1260px,94vw);margin:0 auto 54px}
    .toolbar{position:sticky;top:10px;z-index:8;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;background:rgba(255,248,237,.9);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:26px;padding:14px;box-shadow:var(--shadow)}
    input{width:100%;border:2px solid rgba(139,55,38,.22);border-radius:19px;background:#fffdf8;padding:16px 18px;font-size:17px;outline:none;color:var(--ink)}
    input:focus{border-color:var(--red);box-shadow:0 0 0 4px rgba(179,38,30,.11)}
    .buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    button{border:1px solid rgba(139,55,38,.18);border-radius:999px;padding:12px 16px;background:#fffdf8;color:var(--ink);font-weight:950;cursor:pointer;transition:.16s ease}
    button.active,button:hover{background:var(--red);color:#fff;transform:translateY(-1px)}
    .stats{display:flex;gap:10px;flex-wrap:wrap;margin:18px 2px;color:#5d382f;font-weight:900}
    .pill{background:rgba(255,255,255,.68);border:1px solid var(--line);border-radius:999px;padding:9px 13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:19px;margin-top:12px}
    .card{background:linear-gradient(180deg,var(--paper2),var(--paper));border:1px solid var(--line);border-radius:28px;padding:19px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .card:before{content:attr(data-level);position:absolute;right:16px;top:10px;color:rgba(179,38,30,.11);font-size:72px;font-weight:1000;line-height:1}
    .top{display:flex;gap:10px;align-items:center;position:relative;padding-right:78px}
    .level{display:inline-flex;align-items:center;justify-content:center;background:#251714;color:#fff;border-radius:999px;min-width:56px;height:34px;font-weight:1000;letter-spacing:.06em}
    .grammar{font-size:clamp(25px,3.2vw,32px);font-weight:1000;color:#8f1512;line-height:1.1}
    .meaning{font-size:17px;font-weight:950;margin:13px 0 11px;color:#3c211c}
    .meta{display:grid;gap:8px;margin:12px 0}
    .line{border-left:5px solid var(--gold);background:rgba(255,255,255,.67);padding:10px 12px;border-radius:13px;font-size:15px;line-height:1.48}
    .line b,.analysis b{color:#8f1512}
    .common{border-left-color:var(--matcha)}
    details{margin-top:12px;border-top:1px dashed rgba(90,50,30,.25);padding-top:12px}
    summary{cursor:pointer;font-weight:1000;color:#5b251d;font-size:16px;list-style:none;display:flex;align-items:center;gap:8px}
    summary::-webkit-details-marker{display:none}
    summary:before{content:"開";background:var(--red);color:white;border-radius:999px;font-size:12px;padding:3px 8px}
    details:not([open]) summary:before{content:"閉";background:#251714}
    .ex{margin-top:13px;background:#fffdf8;border:1px solid rgba(120,70,38,.16);border-radius:20px;padding:13px}
    .jp{font-family:"Noto Serif JP","Yu Mincho","Hiragino Mincho ProN",serif;font-size:20px;line-height:1.75;font-weight:900;letter-spacing:.01em}
    .pt{margin-top:8px;line-height:1.56;color:#3e2924;font-weight:650}
    .analysis{margin-top:11px;display:grid;gap:7px}
    .analysis div{padding:9px 10px;border-radius:13px;background:rgba(217,164,65,.13);font-size:14px;line-height:1.48}
    .chunks{margin-top:8px;display:grid;gap:6px}
    .chunk{background:rgba(94,124,67,.12)!important}
    mark{background:#ffe29b;border-radius:6px;padding:0 3px}
    .empty{grid-column:1/-1;text-align:center;padding:30px;background:rgba(255,255,255,.7);border-radius:24px;border:1px solid var(--line);font-weight:900}
    @media(max-width:760px){.toolbar{grid-template-columns:1fr;position:relative;top:0}.buttons{justify-content:flex-start}.grid{grid-template-columns:1fr}.card{border-radius:22px}.top{padding-right:60px}}
  </style>
</head>

grammar": "〜と", "meaning": "com; e; citação", "form": "Nome + と / Frase + と言う", "nuance": "liga pessoas/coisas ou introduz fala/pensamento.", "examples": [{"jp": "昨日、私は会社の先輩と新宿の小さなラーメン屋で遅い夕食を食べました。", "pt": "Ontem comi um jantar tardio com meu veterano da empresa em uma pequena loja de ramen em Shinjuku."}, {"jp": "店員さんは「この電車は三番線から出ます」とゆっくり説明してくれました。", "pt": "O atendente explicou devagar: “Este trem sai da plataforma três”."}], "id": "N5-008", "tags": ["N5", "〜と", "com; e; citação", "Nome + と / Frase + と言う"]}, {"level": "N5", "grammar": "〜の", "meaning": "posse; ligação; nominalização simples", "form": "Nome + の + Nome", "nuance": "mostra posse, origem, tipo ou relação entre nomes.", "examples": [{"jp": "これは祖母の古い着物ですが、色がとてもきれいなので大切にしまっています。", "pt": "Este é o quimono antigo da minha avó; como a cor é muito bonita, guardo com cuidado."}, {"jp": "日本語の授業の後で、クラスの友だちと駅前の店でお茶を飲みました。", "pt": "Depois da aula de japonês, tomei chá com colegas da turma em uma loja perto da estação."}], "id": "N5-009", "tags": ["N5", "〜の", "posse; ligação; nominalização simples", "Nome + の + Nome"]}, {"level": "N5", "grammar": "〜か", "meaning": "pergunta", "form": "Frase + か", "nuance": "transforma uma frase em pergunta; em linguagem educada costuma vir no fim.", "examples": [{"jp": "すみません、このバスは浅草の雷門の近くまで行きますか。", "pt": "Com licença, este ônibus vai até perto do Kaminarimon em Asakusa?"}, {"jp": "明日の朝、駅で先生に会ってから一緒に学校へ行きますか。", "pt": "Amanhã de manhã, vamos encontrar o professor na estação e depois ir juntos para a escola?"}], "id": "N5-010", "tags": ["N5", "〜か", "pergunta", "Frase + か"]}, {"level": "N5", "grammar": "〜です", "meaning": "ser/estar educado", "form": "Nome/Adjetivo-na + です", "nuance": "fecha frases educadas com nome ou adjetivo-na.", "examples": [{"jp": "この旅館の部屋は静かで、窓から見える庭も本当にきれいです。", "pt": "O quarto desta pousada japonesa é silencioso, e o jardim visto da janela também é realmente bonito."}, {"jp": "駅前の新しいスーパーは便利ですが、夕方はいつも人が多いです。", "pt": "O novo supermercado em frente à estação é conveniente, mas à tarde sempre há muitas pessoas."}], "id": "N5-011", "tags": ["N5", "〜です", "ser/estar educado", "Nome/Adjetivo-na + です"]}, {"level": "N5", "grammar": "〜ます", "meaning": "verbo educado presente/futuro", "form": "Raiz masu + ます", "nuance": "forma polida para ações habituais ou futuras.", "examples": [{"jp": "私は毎晩、寝る前に十五分だけ日本語のニュースを聞きます。", "pt": "Todas as noites, antes de dormir, escuto notícias em japonês por apenas quinze minutos."}, {"jp": "週末は友だちの家へ行って、一緒に鍋料理を作ります。", "pt": "No fim de semana, vou à casa de um amigo e prepararemos nabe juntos."}], "id": "N5-012", "tags": ["N5", "〜ます", "verbo educado presente/futuro", "Raiz masu + ます"]}, {"level": "N5", "grammar": "〜ました", "meaning": "verbo educado passado", "form": "Raiz masu + ました", "nuance": "ação concluída no passado em estilo educado.", "examples": [{"jp": "昨日の夜、駅の近くで財布を拾ったので、すぐ交番へ持って行きました。", "pt": "Ontem à noite, como encontrei uma carteira perto da estação, levei-a imediatamente ao posto policial."}, {"jp": "先週、学校の帰りに友だちと古い商店街を歩いて、たい焼きを食べました。", "pt": "Na semana passada, depois da escola, caminhei por uma antiga galeria comercial com amigos e comi taiyaki."}], "id": "N5-013", "tags": ["N5", "〜ました", "verbo educado passado", "Raiz masu + ました"]}, {"level": "N5", "grammar": "〜ません", "meaning": "negação educada", "form": "Raiz masu + ません", "nuance": "nega ações no presente/futuro com polidez.", "examples": [{"jp": "今日は雨が強いので、自転車では学校へ行きません。", "pt": "Como hoje a chuva está forte, não vou para a escola de bicicleta."}, {"jp": "私は辛い食べ物があまり好きではないので、この赤いカレーは食べません。", "pt": "Como não gosto muito de comida apimentada, não comerei este curry vermelho."}], "id": "N5-014", "tags": ["N5", "〜ません", "negação educada", "Raiz masu + ません"]}, {"level": "N5", "grammar": "い形容詞", "meaning": "adjetivo terminado em い", "form": "い-adj + です / かったです", "nuance": "descreve qualidade; muda diretamente no passado e negativo.", "examples": [{"jp": "北海道の冬はとても寒いですが、雪の景色は写真よりずっと美しいです。", "pt": "O inverno de Hokkaido é muito frio, mas a paisagem de neve é muito mais bonita do que nas fotos."}, {"jp": "昨日買ったみかんは安かったですが、甘くて家族みんなが喜びました。", "pt": "As mexericas que comprei ontem eram baratas, mas doces, e toda a família ficou contente."}], "id": "N5-015", "tags": ["N5", "い形容詞", "adjetivo terminado em い", "い-adj + です / かったです"]}, {"level": "N5", "grammar": "な形容詞", "meaning": "adjetivo com な antes de nome", "form": "な-adj + な + Nome / な-adj + です", "nuance": "usa な quando modifica um substantivo.", "examples": [{"jp": "静かな住宅街の中に、小さいけれど有名な和菓子屋があります。", "pt": "Em uma área residencial tranquila, há uma pequena mas famosa loja de doces japoneses."}, {"jp": "親切な駅員さんが、乗り換えの場所を紙に書いて説明してくれました。", "pt": "Um funcionário gentil da estação escreveu no papel o local da baldeação e explicou."}], "id": "N5-016", "tags": ["N5", "な形容詞", "adjetivo com な antes de nome", "な-adj + な + Nome / な-adj + です"]}, {"level": "N5", "grammar": "これ・それ・あれ・どれ", "meaning": "este/esse/aquele/qual", "form": "Pronome demonstrativo", "nuance": "usado sozinho para apontar coisas.", "examples": [{"jp": "これは京都で買った小さなお守りで、毎日かばんの中に入れています。", "pt": "Isto é um pequeno amuleto que comprei em Kyoto e o coloco na bolsa todos os dias."}, {"jp": "すみません、駅の忘れ物の中で、私の黒い手袋はどれですか。", "pt": "Com licença, entre os objetos perdidos da estação, qual é a minha luva preta?"}], "id": "N5-017", "tags": ["N5", "これ・それ・あれ・どれ", "este/esse/aquele/qual", "Pronome demonstrativo"]}, {"level": "N5", "grammar": "この・その・あの・どの", "meaning": "este/esse/aquele + nome", "form": "Demonstrativo + Nome", "nuance": "precisa vir antes de um substantivo.", "examples": [{"jp": "この古い写真は、祖父が若いころ東京で働いていた時のものです。", "pt": "Esta foto antiga é de quando meu avô trabalhava em Tóquio quando era jovem."}, {"jp": "あの赤い鳥居の近くで待っている人が、私の日本語の先生です。", "pt": "A pessoa esperando perto daquele torii vermelho é meu professor de japonês."}], "id": "N5-018", "tags": ["N5", "この・その・あの・どの", "este/esse/aquele + nome", "Demonstrativo + Nome"]}, {"level": "N5", "grammar": "ここ・そこ・あそこ・どこ", "meaning": "aqui/aí/ali/onde", "form": "Demonstrativo de lugar", "nuance": "aponta lugares conforme distância do falante/ouvinte.", "examples": [{"jp": "ここは朝から焼きたてのパンの匂いがする、近所で人気の店です。", "pt": "Aqui é uma loja popular no bairro, onde desde cedo há cheiro de pão recém-assado."}, {"jp": "集合場所はどこですか、駅の北口ですか、それとも南口ですか。", "pt": "Onde é o local de encontro: na saída norte da estação ou na saída sul?"}], "id": "N5-019", "tags": ["N5", "ここ・そこ・あそこ・どこ", "aqui/aí/ali/onde", "Demonstrativo de lugar"]}, {"level": "N5", "grammar": "あります・います", "meaning": "existir/ter", "form": "Objeto/Lugar + に + ある/いる", "nuance": "ある para coisas/plantas; いる para pessoas/animais.", "examples": [{"jp": "公園の入り口に大きな桜の木がありますから、春になると人が集まります。", "pt": "Na entrada do parque há uma grande cerejeira, então na primavera as pessoas se reúnem."}, {"jp": "駅の前に白い犬がいて、飼い主を静かに待っていました。", "pt": "Havia um cachorro branco em frente à estação, esperando calmamente seu dono."}], "id": "N5-020", "tags": ["N5", "あります・います", "existir/ter", "Objeto/Lugar + に + ある/いる"]}, {"level": "N5", "grammar": "〜から〜まで", "meaning": "de... até...", "form": "Ponto inicial + から + Ponto final + まで", "nuance": "marca intervalo de tempo ou espaço.", "examples": [{"jp": "月曜日から金曜日まで、私は毎朝七時半に家を出て会社へ行きます。", "pt": "De segunda a sexta, saio de casa às sete e meia da manhã e vou para a empresa."}, {"jp": "駅から大学まで歩いて二十分ぐらいですが、雨の日はバスに乗ります。", "pt": "Da estação até a universidade leva cerca de vinte minutos a pé, mas em dias de chuva pego ônibus."}], "id": "N5-021", "tags": ["N5", "〜から〜まで", "de... até...", "Ponto inicial + から + Ponto final + まで"]}, {"level": "N5", "grammar": "〜ぐらい・〜くらい", "meaning": "aproximadamente; cerca de", "form": "Quantidade + ぐらい/くらい", "nuance": "indica aproximação natural em conversa.", "examples": [{"jp": "昼休みは四十五分ぐらいあるので、近くの定食屋でゆっくり食べられます。", "pt": "O intervalo de almoço tem cerca de quarenta e cinco minutos, então dá para comer com calma em um restaurante de refeições prontas perto."}, {"jp": "この町から空港まで電車で一時間くらいかかります。", "pt": "Desta cidade até o aeroporto leva cerca de uma hora de egar à estação, envie uma foto da saída norte e espere lá apenas cinco minutos."}], "id": "N5-026", "tags": ["N5", "〜てください", "por favor faça", "Forma て + ください"]}, {"level": "N5", "grammar": "〜てもいいです", "meaning": "pode fazer", "form": "Forma て + もいいです", "nuance": "permissão ou pedido de permissão.", "examples": [{"jp": "暑かったら、教室の窓を少し開けてもいいです。", "pt": "Se estiver calor, pode abrir um pouco a janela da sala."}, {"jp": "この席が空いていたら、ここに荷物を置いてもいいですか。", "pt": "Se este assento estiver livre, posso colocar minha bagagem aqui?"}], "id": "N5-027", "tags": ["N5", "〜てもいいです", "pode fazer", "Forma て + もいいです"]}, {"level": "N5", "grammar": "〜てはいけません", "meaning": "não pode; é proibido", "form": "Forma て + はいけません", "nuance": "proibição clara, regra ou cuidado.", "examples": [{"jp": "図書館の中では大きな声で話してはいけません。", "pt": "Dentro da biblioteca, não se deve falar em voz alta."}, {"jp": "ホームで写真を撮るとき、黄色い線の外へ出てはいけません。", "pt": "Ao tirar foto na plataforma, não se deve passar para fora da linha amarela."}], "id": "N5-028", "tags": ["N5", "〜てはいけません", "não pode; é proibido", "Forma て + はいけません"]}, {"level": "N5", "grammar": "〜ています", "meaning": "estar fazendo; estado resultante", "form": "Forma て + います", "nuance": "ação em progresso ou resultado que continua.", "examples": [{"jp": "母は台所で味噌汁を作っていますから、もうすぐ朝ご飯になります。", "pt": "Minha mãe está preparando missoshiru na cozinha, então logo será o café da manhã."}, {"jp": "駅前の店はもう閉まっていますが、自動販売機はまだ使えます。", "pt": "A loja em frente à estação já está fechada, mas a máquina automática ainda pode ser usada."}], "id": "N5-029", "tags": ["N5", "〜ています", "estar fazendo; estado resultante", "Forma て + います"]}, {"level": "N5", "grammar": "〜たい", "meaning": "querer fazer", "form": "Raiz masu + たい", "nuance": "expressa desejo pessoal; conjuga como い-adjetivo.", "examples": [{"jp": "日本へ行ったら、朝の市場で新鮮な魚を食べてみたいです。", "pt": "Quando eu for ao Japão, quero experimentar peixe fresco em um mercado de manhã."}, {"jp": "今日は疲れたので、早く家に帰って温かいお風呂に入りたいです。", "pt": "Como hoje estou cansado, quero voltar cedo para casa e entrar em um banho quente."}], "id": "N5-030", "tags": ["N5", "〜たい", "querer fazer", "Raiz masu + たい"]}, {"level": "N5", "grammar": "〜に行く", "meaning": "ir para fazer", "form": "Raiz masu + に + 行く/来る/帰る", "nuance": "mostra o objetivo do deslocamento.", "examples": [{"jp": "昼休みに、駅前の銀行へお金を下ろしに行きました。", "pt": "No intervalo do almoço, fui ao banco em frente à estação para sacar dinheiro."}, {"jp": "週末、友だちが私の家へ日本のドラマを見に来ます。", "pt": "No fim de semana, um amigo virá à minha casa para assistir a dramas japoneses."}], "id": "N5-031", "tags": ["N5", "〜に行く", "ir para fazer", "Raiz masu + に + 行く/来る/帰る"]}, {"level": "N5", "grammar": "〜前に", "meaning": "antes de", "form": "Verbo dic. / Nome + の + 前に", "nuance": "ação feita antes de outra.", "examples": [{"jp": "会社へ行く前に、近所の神社の前を通って少し散歩します。", "pt": "Antes de ir para a empresa, passo em frente ao santuário do bairro e caminho um pouco."}, {"jp": "寝る前に、明日の電車の時間をスマホで確認してください。", "pt": "Antes de dormir, verifique no celular o horário do trem de amanhã."}], "id": "N5-032", "tags": ["N5", "〜前に", "antes de", "Verbo dic. / Nome + の + 前に"]}, {"level": "N5", "grammar": "〜後で", "meaning": "depois de", "form": "Verboた / Nome + の + 後で", "nuance": "ação feita depois de outra.", "examples": [{"jp": "晩ご飯を食べた後で、家族とお茶を飲みながらテレビを見ました。", "pt": "Depois de jantar, assisti TV com a família enquanto tomava chá."}, {"jp": "授業の後で、先生に宿題の間違いを一つずつ聞きました。", "pt": "Depois da aula, perguntei ao professor os erros da lição um por um."}], "id": "N5-033", "tags": ["N5", "〜後で", "depois de", "Verboた / Nome + の + 後で"]}, {"level": "N5", "grammar": "〜とき", "meaning": "quando; no momento em que", "form": "Verbo/Adj/Nome + とき", "nuance": "indica situação temporal.", "examples": [{"jp": "電車に乗るとき、先に降りる人を待ってから中に入ります。", "pt": "Quando entra no trem, espera primeiro as pessoas descerem e depois entra."}, {"jp": "子どものとき、祖母の家で夏祭りの太鼓の音をよく聞きました。", "pt": "Quando eu era criança, ouvia frequentemente o som dos tambores do festival de verão na casa da minha avó."}], "id": "N5-034", "tags": ["N5", "〜とき", "quando; no momento em que", "Verbo/Adj/Nome + とき"]}, {"level": "N5", "grammar": "〜から", "meaning": "porque; por isso", "form": "Frase + から", "nuance": "dá razão de modo direto e conversacional.", "examples": [{"jp": "今日は体の調子が悪いですから、会社に電話して早く休みます。", "pt": "Como hoje não estou me sentindo bem, vou ligar para a empresa e descansar cedo."}, {"jp": "この道は夜でも明るいから、駅まで一人で歩いても安心です。", "pt": "Como esta rua é iluminada mesmo à noite, é tranquilo caminhar sozinho até a estação."}], "id": "N5-035", "tags": ["N5", "〜から", "porque; por isso", "Frase + から"]}, {"level": "N5", "grammar": "〜より〜ほうが", "meaning": "comparação", "form": "A より B のほうが + Adj", "nuance": "diz que B é mais X do que A.", "examples": [{"jp": "バスより電車のほうが時間が正確なので、朝はいつも電車を使います。", "pt": "Como o trem é mais pontual que o ônibus, de manhã sempre uso o trem."}, {"jp": "この店のカレーより隣の食堂の定食のほうが安くて量も多いです。", "pt": "O prato feito do restaurante ao lado é mais barato e vem em maior quantidade que o curry desta loja."}], "id": "N5-036", "tags": ["N5", "〜より〜ほうが", "comparação", "A より B のほうが + Adj"]}, {"level": "N5", "grammar": "〜がいちばん", "meaning": "o mais", "form": "Grupo + で + X がいちばん + Adj", "nuance": "escolhe o item de grau máximo dentro de um grupo.", "examples": [{"jp": "日本の季節の中で、桜が咲く春がいちばん好きです。", "pt": "Entre as estações do Japão, gosto mais da primavera, quando as cerejeiras florescem."}, {"jp": "この商店街では、角の小さな和菓子屋のどら焼きがいちばん有名です。", "pt": "Nesta galeria comercial, o dorayaki da pequena loja de doces japoneses da esquina é o mais famoso."}], "id": "N5-037", "tags": ["N5", "〜がいちばん", "o mais", "Grupo + で + X がいちばん + Adj"]}, {"level": "N5", "grammar": "〜たり〜たりする", "meaning": "fazer coisas como...", "form": "Verboた + り + Verboた + りする", "nuance": "lista exemplos de ações, sem dizer tudo.", "examples": [{"jp": "休みの日は洗濯をしたり、スーパーで買い物をしたりして、家でゆっくり過ごします。", "pt": "Nos dias de folga, faço coisas como lavar roupa e fazer compras no supermercado, e passo o tempo em casa com calma."}, {"jp": "旅行中は古いお寺を見たり、駅弁を食べたりして、日本の雰囲気を楽しみました。", "pt": "Durante a viagem, fiz coisas como ver templos antigos e comer ekiben, aproveitando a atmosfera japonesa."}], "id": "N5-038", "tags": ["N5", "〜たり〜たりする", "fazer coisas como...", "Verboた + り + Verboた + りする"]}, {"level": "N5", "grammar": "〜ことができる", "meaning": "poder; ser capaz de", "form": "Verbo dic. + ことができる", "nuance": "forma clara para habilidade ou possibilidade.", "examples": [{"jp": "このアプリを使えば、駅の乗り換えを日本語で簡単に調べることができます。", "pt": "Se usar este aplicativo, pode pesquisar facilmente as baldeações da estação em japonês."}, {"jp": "受付で予約番号を見せると、すぐに部屋へ入ることができます。", "pt": "Ao mostrar o número da reserva na recepção, pode entrar no quarto imediatamente."}], "id": "N5-039", "tags": ["N5", "〜ことができる", "poder; ser capaz de", "Verbo dic. + ことができる"]}, {"level": "N5", "grammar": "〜たことがある", "meaning": "já ter feito", "form": "Verboた + ことがある", "nuance": "experiência de vida até agora.", "examples": [{"jp": "私は一度だけ、京都の古い町家に泊まったことがあります。", "pt": "Eu já fiquei uma vez em uma antiga casa tradicional de Kyoto."}, {"jp": "友だちは北海道で雪まつりを見たことがあるので、冬の旅行に詳しいです。", "pt": "Meu amigo já viu o festival de neve em Hokkaido, então conhece bem viagens de inverno."}], "id": "N5-040", "tags": ["N5", "〜たことがある", "já ter feito", "Verboた + ことがある"]}, {"level": "N4", "grammar": "〜そうです・様態", "meaning": "parece; tem aparência de", "form": "Raiz/Adj + そうです", "nuance": "julgamento visual imediato; não usa com substantivo diretamente.", "examples": [{"jp": "空が急に暗くなってきたので、あと少しで雨が降りそうです。", "pt": "O céu ficou escuro de repente, então parece que vai chover em pouco tempo."}, {"jp": "この抹茶のケーキは色も香りもよくて、とてもおいしそうです。", "pt": "Este bolo de matcha tem cor e aroma bons, e parece muito gostoso."}], "id": "N4-041", "tags": ["N4", "〜そうです・様態", "parece; tem aparência de", "Raiz/Adj + そうです"]}, {"level": "N4", "grammar": "〜そうです・伝聞", "meaning": "dizem que; ouvi que", "form": "Frase comum + そうです", "nuance": "repasse de informação ou notícia recebida.", "examples": [{"jp": "天気予報によると、明日は朝から強い風が吹くそうです。", "pt": "Seg ng": "demais; excessivamente", "form": "Raiz/Adj + すぎる", "nuance": "algo passa do nível adequado.", "examples": [{"jp": "昨日の夜、ラーメンを食べすぎたので、今朝はあまりお腹が空いていません。", "pt": "Ontem à noite comi ramen demais, então hoje de manhã não estou com muita fome."}, {"jp": "この部屋は静かすぎて、隣の家の時計の音まで聞こえます。", "pt": "Este quarto é silencioso demais, a ponto de dar para ouvir até o som do relógio da casa ao lado."}], "id": "N4-046", "tags": ["N4", "〜すぎる", "demais; excessivamente", "Raiz/Adj + すぎる"]}, {"level": "N4", "grammar": "〜やすい", "meaning": "fácil de fazer", "form": "Raiz masu + やすい", "nuance": "ação ocorre com facilidade; também tendência.", "examples": [{"jp": "この駅は出口の表示が大きいので、初めて来た人にも分かりやすいです。", "pt": "Nesta estação as placas das saídas são grandes, então é fácil de entender até para quem vem pela primeira vez."}, {"jp": "この靴は軽くて歩きやすいので、京都旅行で一日中使いました。", "pt": "Estes sapatos são leves e fáceis de caminhar, então os usei o dia inteiro na viagem a Kyoto."}], "id": "N4-047", "tags": ["N4", "〜やすい", "fácil de fazer", "Raiz masu + やすい"]}, {"level": "N4", "grammar": "〜にくい", "meaning": "difícil de fazer", "form": "Raiz masu + にくい", "nuance": "ação é difícil por característica da coisa/situação.", "examples": [{"jp": "この漢字は線が多くて覚えにくいですが、毎日書くと少しずつ慣れます。", "pt": "Este kanji tem muitos traços e é difícil de memorizar, mas se escrever todos os dias, aos poucos se acostuma."}, {"jp": "雨の日の満員電車では、かばんからスマホを出しにくいです。", "pt": "Em trem lotado em dia de chuva, é difícil tirar o celular da bolsa."}], "id": "N4-048", "tags": ["N4", "〜にくい", "difícil de fazer", "Raiz masu + にくい"]}, {"level": "N4", "grammar": "〜始める", "meaning": "começar a fazer", "form": "Raiz masu + 始める", "nuance": "início de uma ação ou mudança.", "examples": [{"jp": "春になると、駅前の桜が少しずつ咲き始めます。", "pt": "Quando chega a primavera, as cerejeiras em frente à estação começam a florescer pouco a pouco."}, {"jp": "子どもたちは太鼓の音を聞いて、急に盆踊りを踊り始めました。", "pt": "As crianças ouviram o som do tambor e de repente começaram a dançar bon odori."}], "id": "N4-049", "tags": ["N4", "〜始める", "começar a fazer", "Raiz masu + 始める"]}, {"level": "N4", "grammar": "〜続ける", "meaning": "continuar fazendo", "form": "Raiz masu + 続ける", "nuance": "ação mantida por um período.", "examples": [{"jp": "雨が降っても、彼は毎朝同じ時間に川沿いを走り続けています。", "pt": "Mesmo que chova, ele continua correndo pela margem do rio no mesmo horário todas as manhãs."}, {"jp": "日本語が難しくても、毎日少しずつ勉強し続けることが大切です。", "pt": "Mesmo que japonês seja difícil, é importante continuar estudando um pouco todos os dias."}], "id": "N4-050", "tags": ["N4", "〜続ける", "continuar fazendo", "Raiz masu + 続ける"]}, {"level": "N4", "grammar": "〜終わる", "meaning": "terminar de fazer", "form": "Raiz masu + 終わる", "nuance": "conclusão de uma ação intencional.", "examples": [{"jp": "宿題を書き終わったら、駅前の本屋へ新しい漫画を買いに行きます。", "pt": "Quando terminar de escrever a lição, irei à livraria em frente à estação comprar um mangá novo."}, {"jp": "会議で使う資料を読み終わってから、分からない言葉をメモしました。", "pt": "Depois de terminar de ler os materiais que serão usados na reunião, anotei as palavras que não entendi."}], "id": "N4-051", "tags": ["N4", "〜終わる", "terminar de fazer", "Raiz masu + 終わる"]}, {"level": "N4", "grammar": "〜出す", "meaning": "começar de repente", "form": "Raiz masu + 出す", "nuance": "início súbito ou inesperado.", "examples": [{"jp": "電車を待っていたら、空が暗くなって急に雨が降り出しました。", "pt": "Enquanto esperava o trem, o céu escureceu e de repente começou a chover."}, {"jp": "静かだった赤ちゃんが、駅のアナウンスを聞いた瞬間に泣き出しました。", "pt": "O bebê que estava quieto começou a chorar no momento em que ouviu o anúncio da estação."}], "id": "N4-052", "tags": ["N4", "〜出す", "começar de repente", "Raiz masu + 出す"]}, {"level": "N4", "grammar": "〜ながら", "meaning": "enquanto faz", "form": "Raiz masu + ながら", "nuance": "duas ações simultâneas pelo mesmo sujeito.", "examples": [{"jp": "私は朝ご飯を食べながら、スマホで今日の電車の遅れを確認します。", "pt": "Enquanto tomo café da manhã, verifico no celular os atrasos dos trens de hoje."}, {"jp": "祖母は昔の歌を歌いながら、台所でゆっくりおにぎりを作っていました。", "pt": "Minha avó estava fazendo onigiri devagar na cozinha enquanto cantava uma canção antiga."}], "id": "N4-053", "tags": ["N4", "〜ながら", "enquanto faz", "Raiz masu + ながら"]}, {"level": "N4", "grammar": "〜し〜し", "meaning": "e também; além disso", "form": "Frase + し、Frase + し", "nuance": "lista razões ou características com tom explicativo.", "examples": [{"jp": "このアパートは駅に近いし、家賃も安いし、学生にはとても便利です。", "pt": "Este apartamento fica perto da estação, o aluguel também é barato, e é muito conveniente para estudantes."}, {"jp": "あの食堂は料理がおいしいし、店員さんも親切だし、昼休みによく行きます。", "pt": "A comida daquele restaurante é gostosa, os atendentes são gentis, então vou lá frequentemente no almoço."}], "id": "N4-054", "tags": ["N4", "〜し〜し", "e também; além disso", "Frase + し、Frase + し"]}, {"level": "N4", "grammar": "〜ば", "meaning": "se; caso", "form": "Forma condicional ば", "nuance": "condição geral, regra ou hipótese.", "examples": [{"jp": "この道をまっすぐ行けば、五分ぐらいで古い神社の鳥居が見えます。", "pt": "Se seguir reto por esta rua, em cerca de cinco minutos verá o torii do santuário antigo."}, {"jp": "毎日少しでも漢字を読めば、新聞の見出しがだんだん分かるようになります。", "pt": "Se ler kanji nem que seja um pouco todos os dias, aos poucos passará a entender as manchetes do jornal."}], "id": "N4-055", "tags": ["N4", "〜ば", "se; caso", "Forma condicional ば"]}, {"level": "N4", "grammar": "〜たら", "meaning": "se/quando acontecer", "form": "Formaた + ら", "nuance": "condição concreta; depois que algo ocorrer.", "examples": [{"jp": "駅に着いたら、まず北口を出て、右側のコンビニの前で待っていてください。", "pt": "Quando chegar à estação, primeiro saia pela saída norte e espere em frente à loja de conveniência à direita."}, {"jp": "仕事が早く終わったら、友だちと新しいラーメン屋へ行くつもりです。", "pt": "Se o trabalho terminar cedo, pretendo ir com um amigo a uma loja nova de ramen."}], "id": "N4-056", "tags": ["N4", "〜たら", "se/quando acontecer", "Formaた + ら"]}, {"level": "N4", "grammar": "〜なら", "meaning": "se for; quanto a", "form": "Nome/Frase + なら", "nuance": "responde a um tópico já mencionado; recomenda ou limita.", "examples": [{"jp": "京都へ行くなら、朝早く清水寺に行くと人が少なくて歩きやすいです。", "pt": "Se for a K る", "nuance": "regra, costume ou decisão já estabelecida.", "examples": [{"jp": "この寮では、夜十一時を過ぎたら大きな音を出してはいけないことになっています。", "pt": "Neste dormitório, está estabelecido que depois das onze da noite não se deve fazer barulho alto."}, {"jp": "会社では、出張の前に必ず上司へ予定を報告することになっています。", "pt": "Na empresa, ficou determinado que antes de viagens de trabalho é obrigatório informar a agenda ao chefe."}], "id": "N3-081", "tags": ["N3", "〜ことになっている", "está combinado/regulado", "Verbo dic. + ことになっている"]}, {"level": "N3", "grammar": "〜ことにしている", "meaning": "tenho o hábito/decidi manter", "form": "Verbo dic./ない + ことにしている", "nuance": "decisão pessoal contínua.", "examples": [{"jp": "健康のために、駅ではエスカレーターを使わず階段を上ることにしています。", "pt": "Pela saúde, decidi manter o hábito de subir escadas na estação sem usar a escada rolante."}, {"jp": "新しい言葉を覚えた日は、その言葉で短い日記を書くことにしています。", "pt": "No dia em que aprendo uma palavra nova, mantenho o hábito de escrever um diário curto com essa palavra."}], "id": "N3-082", "tags": ["N3", "〜ことにしている", "tenho o hábito/decidi manter", "Verbo dic./ない + ことにしている"]}, {"level": "N3", "grammar": "〜ようとする", "meaning": "tentar fazer; estar prestes a", "form": "Volicional + とする", "nuance": "tentativa intencional ou momento imediatamente antes.", "examples": [{"jp": "電車に乗ろうとしたとき、後ろから友だちに名前を呼ばれました。", "pt": "Quando eu estava prestes a entrar no trem, um amigo me chamou pelo nome por trás."}, {"jp": "猫は窓から外へ出ようとして、カーテンに足を引っかけました。", "pt": "O gato tentou sair pela janela e prendeu a pata na cortina."}], "id": "N3-083", "tags": ["N3", "〜ようとする", "tentar fazer; estar prestes a", "Volicional + とする"]}, {"level": "N3", "grammar": "〜ように言う", "meaning": "mandar/pedir que", "form": "Verbo dic./ない + ように言う", "nuance": "ordem indireta, pedido ou instrução repassada.", "examples": [{"jp": "先生は学生に、試験の日は十分早く教室へ来るように言いました。", "pt": "O professor disse aos alunos que viessem à sala cedo o suficiente no dia da prova."}, {"jp": "母は弟に、夜遅くまでゲームをしないように何度も言っています。", "pt": "Minha mãe diz muitas vezes ao meu irmão para não jo ": "この町に引っ越して以来、毎朝駅前のパン屋で朝食を買っています。", "pt": "Desde que me mudei para esta cidade, compro café da manhã toda manhã na padaria em frente à estação."}], "id": "N3-190", "tags": ["N3", "〜て以来", "desde que", "Verboて + 以来"]}, {"level": "N3", "grammar": "〜上で", "meaning": "depois de; para fazer", "form": "Verboた + 上で / Verbo dic. + 上で", "nuance": "sequência cuidadosa ou condição necessária.", "examples": [{"jp": "契約書をよく読んだ上で、分からない点を不動産屋に質問しました。", "pt": "Depois de ler bem o contrato, perguntei à imobiliária os pontos que não entendi."}, {"jp": "日本で生活する上で、病院や役所で使う言葉を覚えることは大切です。", "pt": "Para viver no Japão, é importante aprender palavras usadas em hospitais e repartições públicas."}], "id": "N3-191", "tags": ["N3", "〜上で", "depois de; para fazer", "Verboた + 上で / Verbo dic. + 上で"]}, {"level": "N3", "grammar": "〜さえ", "meaning": "até mesmo; se ao menos", "form": "Nome + さえ", "nuance": "enfatiza mínimo ou extremo.", "examples": [{"jp": "忙しすぎて、昼ご飯を食べる時間さえありませんでした。", "pt": "Eu estava tão ocupado que nem mesmo tive tempo de almoçar."}, {"jp": "名前さえ分かれば、受付で予約を確認してもらえます。", "pt": "Se ao menos souber o nome, dá para pedir que confirmem a reserva na recepção."}], "id": "N3-192", "tags": ["N3", "〜さえ", "até mesmo; se ao menos", "Nome + さえ"]}, {"level": "N3", "grammar": "〜なんて", "meaning": "algo como; que surpresa", "form": "Nome/Frase + なんて", "nuance": "emoção, surpresa, desvalorização ou exemplo casual.", "examples": [{"jp": "一週間でこの本を全部読んだなんて、本当にすごいですね。", "pt": "Você leu este livro inteiro em uma semana? Isso é realmente incrível."}, {"jp": "大事な日に財布を忘れるなんて、自分でも信じられませんでした。", "pt": "Esquecer a carteira em um dia importante, nem eu mesmo consegui acreditar."}], "id": "N3-193", "tags": ["N3", "〜なんて", "algo como; que surpresa", "Nome/Frase + なんて"]}];
let current = 'ALL';
const grid = document.getElementById('grid');
const stats = document.getElementById('stats');
const search = document.getElementById('search');
const buttons = document.getElementById('buttons');

function esc(s){return String(s ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function safeRegex(q){return q.replace(/[.*+?^${}()|[\]\]/g,'\$&');}
function highlight(s,q){s=esc(s); if(!q) return s; return s.replace(new RegExp(safeRegex(q),'gi'), m=>`<mark>${m}</mark>`);}
function levelName(level){return {N5:'base cotidiana',N4:'base expandida',N3:'intermediário natural',N2:'avançado funcional'}[level] || 'geral';}
function mistake(item){
  const g = item.grammar;
  if(g.includes('は')) return 'não traduza como “é”; は marca o assunto, e a informação principal vem depois.';
  if(g.includes('が')) return 'não use が só porque em português existe sujeito; aqui ele destaca existência, gosto, foco ou informação nova.';
  if(g.includes('を')) return 'não troque を por に quando a ação atinge um objeto direto ou percorre um caminho.';
  if(g.includes('に')) return 'não misture com で: に aponta destino, horário ou existência; で marca local da ação ou meio.';
  if(g.includes('で')) return 'não use で para existência parada; para “há em algum lugar”, normalmente use に + あります/います.';
  if(g.includes('て')) return 'confira a forma て do verbo; errar a conjugação muda a naturalidade da frase inteira.';
  if(g.includes('ない')) return 'cuidado para não duplicar a negação em português e japonês; a negação já está na estrutura.';
  if(g.includes('ば') || g.includes('たら') || g.includes('なら')) return 'não trate todos os “se” como iguais: cada condicional tem foco e momento diferentes.';
  if(g.includes('よう')) return 'não traduza sempre como “parece”; よう também pode indicar objetivo, mudança ou esforço.';
  if(g.includes('もの')) return 'não traduza もの literalmente como “coisa” quando ele cria nuance gramatical.';
  if(g.includes('に対して') || g.includes('について') || g.includes('によって') || g.includes('にとって')) return 'não escolha só pela tradução; essas formas dependem da relação lógica com o nome anterior.';
  if(item.level==='N2') return 'em N2, evite tradução palavra por palavra; observe a relação lógica: causa, contraste, condição, limite ou formalidade.';
  if(item.level==='N3') return 'em N3, a frase costuma depender de nuance; compare com estruturas parecidas antes de usar.';
  return 'não decore só a tradução; memorize a formação e uma frase natural do dia a dia.';
}
function splitJapanese(s){
  const raw = String(s).replace(/。$/,'').split(/、|。|；|;|：|:/).map(x=>x.trim()).filter(Boolean);
  if(raw.length >= 2) return raw.slice(0,4);
  return String(s).replace(/。$/,'').split(/(?<=で|に|から|まで|ので|けど|が|と|たら|ても|ながら)/).map(x=>x.trim()).filter(Boolean).slice(0,4);
}
function chunkExplain(chunk,item,index){
  const hints=[];
  if(chunk.includes('は')) hints.push('define o tema da parte');
  if(chunk.includes('が')) hints.push('marca foco, sujeito novo ou existência');
  if(chunk.includes('を')) hints.push('mostra o objeto/caminho da ação');
  if(chunk.includes('に')) hints.push('aponta destino, tempo, alvo ou existência');
  if(chunk.includes('で')) hints.push('mostra local da ação, meio ou ferramenta');
  if(chunk.includes('から')) hints.push('dá origem, ponto inicial ou causa');
  if(chunk.includes('ので')) hints.push('explica motivo de modo natural');
  if(chunk.includes('が') && chunk.includes('ます')) hints.push('mantém tom educado');
  if(hints.length===0) hints.push('completa a cena da frase e mantém o contexto japonês cotidiano');
  return `<div class="chunk"><b>Bloco ${index}:</b> ${esc(chunk)} → ${hints.join('; ')}.</div>`;
}
function exampleBlock(item, ex, idx, q){
  const chunks = splitJapanese(ex.jp).map((c,i)=>chunkExplain(c,item,i+1)).join('');
  return `<div class="ex">
    <div class="jp">${highlight(ex.jp,q)}</div>
    <div class="pt">${highlight(ex.pt,q)}</div>
    <div class="analysis">
      <div><b>Linha 1 — Frase:</b> exemplo longo e usual, com cenário japonês do cotidiano.</div>
      <div><b>Linha 2 — Estrutura-alvo:</b> ${esc(item.grammar)} aparece aqui com o sentido de “${esc(item.meaning)}”.</div>
      <div><b>Linha 3 — Formação:</b> ${esc(item.form)}.</div>
      <div><b>Linha 4 — Nuance:</b> ${esc(item.nuance)}</div>
      <div><b>Linha 5 — Tradução natural:</b> ${esc(ex.pt)}</div>
      <div><b>Linha 6 — Cuidado:</b> ${esc(mistake(item))}</div>
      <div class="chunks">${chunks}</div>
    </div>
  </div>`;
}
function card(item,q){
  const examples = item.examples.map((ex,i)=>exampleBlock(item,ex,i+1,q)).join('');
  return `<article class="card" data-level="${item.level}" id="${item.id}">
    <div class="top"><span class="level">${item.level}</span><div class="grammar">${highlight(item.grammar,q)}</div></div>
    <div class="meaning">${highlight(item.meaning,q)}</div>
    <div class="meta">
      <div class="line"><b>Forma:</b> ${highlight(item.form,q)}</div>
      <div class="line"><b>Uso:</b> ${highlight(item.nuance,q)}</div>
      <div class="line common"><b>Nível:</b> ${item.level} · ${levelName(item.level)} · uso em frases reais de conversa, escola, trabalho, estação, loja, casa e viagem.</div>
    </div>
    <details open><summary>例文・explicação linha por linha</summary>${examples}</details>
  </article>`;
}
function render(){
  const q = search.value.trim().toLowerCase();
  const filtered = DATA.filter(item => (current==='ALL'||item.level===current) && JSON.stringify(item).toLowerCase().includes(q));
  const counts = ['N5','N4','N3','N2'].map(l=>`${l}: ${DATA.filter(x=>x.level===l).length}`).join(' · ');
  stats.innerHTML = `<span class="pill">表示: ${filtered.length} / ${DATA.length}</span><span class="pill">${counts}</span>`;
  grid.innerHTML = filtered.length ? filtered.map(item=>card(item,q)).join('') : `<div class="empty">見つかりません</div>`;
}
buttons.addEventListener('click', e=>{
  if(e.target.tagName !== 'BUTTON') return;
  [...buttons.querySelectorAll('button')].forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  current = e.target.dataset.level;
  render();
});
search.addEventListener('input', render);
render();
</script>
